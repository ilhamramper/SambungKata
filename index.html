<!DOCTYPE html>
<html>

<head>
    <title>Pencarian Kata KBBI</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        input,
        button {
            padding: 10px;
            width: 100px;
            font-size: 16px;
        }

        ul {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            padding-left: 20px;
        }

        li {
            margin: 4px 0;
        }

        .dipakai {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Pencarian Kata KBBI (Realtime)</h2>

    <input type="text" id="pola" placeholder="Contoh: .a | b. | a.z" autofocus>

    <input type="number" id="max" placeholder="Panjang huruf dlm 1 kalimat" value="15">

    <button onclick="resetKata()">Reset Kata</button>

    <ul id="hasil"></ul>

    <script>
        let data = [];

        // =========================
        // LOAD DATA JSON
        // =========================
        fetch('data.json')
            .then(res => res.json())
            .then(json => {
                data = json;
            });

        // =========================
        // KONVERSI POLA
        // =========================
        function polaKeRegex(pola) {
            let regexStr = pola.replaceAll(".", ".*");
            return new RegExp("^" + regexStr + "$");
        }

        // =========================
        // PENCARIAN REALTIME
        // =========================
        document.getElementById("pola").addEventListener("input", function () {
            let pola = this.value.toLowerCase();
            let max = parseInt(document.getElementById("max").value);

            if (pola.length === 0) {
                document.getElementById("hasil").innerHTML = "";
                return;
            }

            let regex = polaKeRegex(pola);

            let hasil = data.filter(kata =>
                regex.test(kata) && kata.length <= max
            );

            // urutkan dari panjang terbesar
            hasil.sort((a, b) => b.length - a.length);

            // tampilkan
            let ul = document.getElementById("hasil");
            ul.innerHTML = "";

            hasil.slice(0, 100).forEach(kata => {
                let li = document.createElement("li");
                li.textContent = kata;

                // klik → tandai merah
                li.addEventListener("click", function () {
                    this.classList.toggle("dipakai");
                });

                ul.appendChild(li);
            });
        });

        // =========================
        // RESET
        // =========================
        function resetKata() {
            document.querySelectorAll("li").forEach(li => {
                li.classList.remove("dipakai");
            });
        }
    </script>

</body>

</html>
