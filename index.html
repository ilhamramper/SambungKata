<!DOCTYPE html>
<html>

<head>
    <title>Pencarian Kata KBBI</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        input,
        button {
            padding: 10px;
            width: 100px;
            font-size: 16px;
            margin: 5px 0;
        }
        
        #pola {
            width: 200px;
        }

        ul {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            padding-left: 20px;
        }

        /* Jarak diperkecil agar list tampil rapat */
        li {
            margin: 2px 0; 
            cursor: pointer;
        }

        li:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>

<body>

    <h2>Pencarian Kata KBBI (Realtime)</h2>

    <input type="text" id="pola" placeholder="Contoh: .a | b. | a.z" autofocus>

    <input type="number" id="max" placeholder="Panjang huruf" value="15">

    <button onclick="resetKata()">Reset</button>

    <ul id="hasil"></ul>

    <script>
        let data = [];
        let kataDipakai = new Set(); 

        // =========================
        // LOAD DATA JSON
        // =========================
        fetch('data.json')
            .then(res => res.json())
            .then(json => {
                data = json;
            });

        // =========================
        // KONVERSI POLA
        // =========================
        function polaKeRegex(pola) {
            let regexStr = pola.replaceAll(".", ".*");
            return new RegExp("^" + regexStr + "$");
        }

        // =========================
        // PENCARIAN REALTIME
        // =========================
        document.getElementById("pola").addEventListener("input", function () {
            let pola = this.value.toLowerCase();
            let max = parseInt(document.getElementById("max").value);

            if (pola.length === 0) {
                document.getElementById("hasil").innerHTML = "";
                return;
            }

            let regex = polaKeRegex(pola);

            let hasil = data.filter(kata =>
                regex.test(kata) && 
                kata.length <= max &&
                !kataDipakai.has(kata) 
            );

            // urutkan dari panjang terbesar
            hasil.sort((a, b) => b.length - a.length);

            let ul = document.getElementById("hasil");
            ul.innerHTML = "";

            // Dibatasi maksimal 5000 data agar web tidak lag
            hasil.slice(0, 5000).forEach(kata => {
                let li = document.createElement("li");
                li.textContent = kata;

                // event klik
                li.addEventListener("click", function () {
                    // Copy ke clipboard
                    navigator.clipboard.writeText(kata).then(() => {
                        // Masukkan ke Set kataDipakai agar disembunyikan
                        kataDipakai.add(kata);
                        
                        // Hapus elemen li ini langsung dari tampilan
                        this.remove();
                    }).catch(err => {
                        console.error('Gagal menyalin teks: ', err);
                        alert("Gagal menyalin teks. Pastikan browser mengizinkan akses clipboard.");
                    });
                });

                ul.appendChild(li);
            });
        });

        // =========================
        // RESET
        // =========================
        function resetKata() {
            kataDipakai.clear();
            document.getElementById("pola").dispatchEvent(new Event('input'));
        }
    </script>

</body>

</html>
