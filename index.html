<!DOCTYPE html>
<html>

<head>
    <title>Pencarian Kata KBBI</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        input {
            padding: 10px;
            width: 300px;
            font-size: 16px;
        }

        ul {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            padding-left: 20px;
        }

        li {
            margin: 4px 0;
        }
    </style>
</head>

<body>

    <h2>Pencarian Kata KBBI (Realtime)</h2>

    <input type="text" id="pola" placeholder="Contoh: .a | b. | a.z" autofocus>

    <ul id="hasil"></ul>

    <script>
        let data = [];

        // =========================
        // LOAD DATA JSON
        // =========================
        fetch('data.json')
            .then(res => res.json())
            .then(json => {
                data = json;
            });

        // =========================
        // KONVERSI POLA ('.' → '.*')
        // =========================
        function polaKeRegex(pola) {
            let regexStr = pola.replaceAll(".", ".*");
            return new RegExp("^" + regexStr + "$");
        }

        // =========================
        // REALTIME SEARCH
        // =========================
        document.getElementById("pola").addEventListener("input", function () {
            let pola = this.value.toLowerCase().trim();

            let ul = document.getElementById("hasil");
            ul.innerHTML = "";

            if (pola.length === 0) return;

            let regex = polaKeRegex(pola);

            let hasil = data.filter(kata => regex.test(kata));

            // urutkan dari kata terpanjang
            hasil.sort((a, b) => b.length - a.length);

            // tampilkan maksimal 100
            hasil.slice(0, 100).forEach(kata => {
                let li = document.createElement("li");
                li.textContent = kata;
                ul.appendChild(li);
            });
        });
    </script>

</body>

</html>
